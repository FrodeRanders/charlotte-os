[package]
name = "catten-user"
version = "0.1.0"
edition = "2024"
description = "CharlotteOS test user binary — exercises sitas shard-per-core runtime on CharlotteOS"

[[bin]]
name = "catten-user"
path = "src/main.rs"
test = false
bench = false

[dependencies]
sitas-core = { path = "../../../../gautelis/sitas/crates/sitas-core" }
sitas-charlotte = { path = "../../../../gautelis/sitas/crates/sitas-charlotte" }

[profile.dev]
panic = "abort"
opt-level = "s"
lto = true

[profile.release]
panic = "abort"
opt-level = "s"
lto = true
