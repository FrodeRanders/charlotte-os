[package]
name = "catten-user"
version = "0.1.0"
edition = "2024"
description = "CharlotteOS test user binary — exercises the async syscall ABI from EL0"

[[bin]]
name = "catten-user"
path = "src/main.rs"
test = false
bench = false

[profile.dev]
panic = "abort"
opt-level = "s"
lto = true

[profile.release]
panic = "abort"
opt-level = "s"
lto = true
